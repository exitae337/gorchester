env: "local"
listen_addr: ":8080"
cluster_name: "scale-demo"

nodes:
  - id: "node-1"
    hostname: "worker-1.local"
    ip: "192.168.1.101"
    cpu: 4000
    memory: 17179869184
    labels:
      zone: "a"
  - id: "node-2"
    hostname: "worker-2.local"
    ip: "192.168.1.102"
    cpu: 8000
    memory: 34359738368
    labels:
      zone: "b"
  - id: "node-3"
    hostname: "worker-3.local"
    ip: "192.168.1.103"
    cpu: 2000
    memory: 8589934592
    labels:
      zone: "a"

services:
  - service_name: "cpu-worker"
    image: "alpine:latest"
    service_type: "stateless"
    replicas: 1
    command:
      - "sh"
      - "-c"
      - "while true; do echo 'scale=5000; a(1)*4' | bc -l > /dev/null; done"
    ports:
      - host_port: 0
        container_port: 8080
        protocol: "tcp"
    resources:
      cpu_millicores: 500
      memory_bytes: 134217728
    scale_policy:
      min_replicas: 1
      max_replicas: 6
      target_cpu: 3.0
      target_memory: 80.0
      cooldown_seconds: 30
      predictive_scaling:
        enabled: true
        lookback_window: 300
        prediction_window: 60
        cpu_threshold: 3.0
        memory_threshold: 85.0
    health_check:
      type: "command"
      command: ["echo", "healthy"]
      interval: "30s"
      timeout: "5s"
      retries: 2