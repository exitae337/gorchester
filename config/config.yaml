env: "local"
listen_addr: ":8080"
data_dir: "./test-data"
cluster_name: "dev-cluster"

services:
  - service_name: "test-web"
    image: "nginx:alpine"
    replicas: 2
    ports:
      - host_port: 0
        container_port: 80
        protocol: "tcp"
    resources:
      cpu_millicores: 200
      memory_bytes: 134217728
    scale_policy:
      min_replicas: 1
      max_replicas: 3
      target_cpu: 70.0
      cooldown_seconds: 60
    health_check:
      type: "http"
      http_path: "/"
      port: 80
      interval: "10s"  # ✅ строка
      timeout: "5s"    # ✅ строка
      retries: 3

  - service_name: "test-cache"
    image: "redis:alpine"
    replicas: 1
    ports:
      - host_port: 6379
        container_port: 6379
        protocol: "tcp"
    resources:
      cpu_millicores: 100
      memory_bytes: 67108864
    health_check:
      type: "tcp"
      port: 6379
      interval: "15s"  # ✅ строка
      timeout: "5s"    # ✅ строка
      retries: 3

  - service_name: "echo-service"
    image: "busybox:latest"
    replicas: 1
    command:
      - "sh"
      - "-c"
      - "echo 'Test service running' && sleep 3600"
    resources:
      cpu_millicores: 50
      memory_bytes: 33554432
    health_check:
      type: "command"
      command: ["echo", "healthy"]
      interval: "30s"  # ✅ строка
      timeout: "5s"    # ✅ строка
      retries: 2