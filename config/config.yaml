env: "local"
listen_addr: ":8080"
cluster_name: "final-test"

nodes:
  - id: "node-1"
    hostname: "worker-1.local"
    ip: "192.168.1.101"
    cpu: 4000
    memory: 17179869184
    labels:
      zone: "a"
  - id: "node-2"
    hostname: "worker-2.local"
    ip: "192.168.1.102"
    cpu: 8000
    memory: 34359738368
    labels:
      zone: "b"
  - id: "node-3"
    hostname: "worker-3.local"
    ip: "192.168.1.103"
    cpu: 2000
    memory: 8589934592
    labels:
      zone: "a"

services:
  - service_name: "web-server"
    image: "nginx:alpine"
    service_type: "stateless"
    replicas: 3
    ports:
      - host_port: 0
        container_port: 80
        protocol: "tcp"
    resources:
      cpu_millicores: 200
      memory_bytes: 134217728
    health_check:
      type: "http"
      http_path: "/"
      port: 80
      interval: "10s"
      timeout: "5s"
      retries: 3

  - service_name: "redis-cache"
    image: "redis:alpine"
    service_type: "stateful"
    replicas: 1
    ports:
      - host_port: 0
        container_port: 6379
        protocol: "tcp"
    resources:
      cpu_millicores: 100
      memory_bytes: 67108864
    health_check:
      type: "tcp"
      port: 6379
      interval: "15s"
      timeout: "5s"
      retries: 3